name: tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-and-python:
    name: tests (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_DECIDE_DISABLE: "1"
      TEST_JOBS_MAX: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          sudo bash tests/run-tests.sh --install-container-deps

      - name: Show tool versions
        run: |
          bash --version | head -1
          python3 --version
          jq --version
          clang --version | head -1
          rg --version | head -1

      - name: Run test suite
        run: bash tests/run-tests.sh
