name: tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-host:
    name: tests (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # 3.12 is the floor (ubuntu:24.04 system python); the newest stable
        # leg catches stdlib behaviour divergences in both directions.
        python-version: ["3.12", "3.14"]
    env:
      LLM_DECIDE_DISABLE: "1"
      TEST_JOBS_MAX: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime dependencies
        run: |
          sudo bash tests/run-tests.sh --install-container-deps

      - name: Show tool versions
        run: |
          bash --version | head -1
          python3 --version
          jq --version
          clang --version | head -1
          rg --version | head -1

      - name: Run test suite
        run: bash tests/run-tests.sh

  macos-host:
    name: tests (macos)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      LLM_DECIDE_DISABLE: "1"
      TEST_JOBS_MAX: "4"
      LLVM_PREFIX: /opt/homebrew/opt/llvm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          brew install jq ripgrep llvm mercurial

      - name: Show tool versions
        run: |
          /bin/bash --version | head -1
          python3 --version
          jq --version
          clang --version | head -1
          rg --version | head -1

      - name: Run test suite
        run: /bin/bash tests/run-tests.sh

  ubuntu-container:
    name: tests (ubuntu container)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LLM_DECIDE_DISABLE: "1"
      TEST_JOBS_MAX: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show Docker version
        run: docker version

      - name: Run test suite in Ubuntu image
        run: bash tests/run-tests.sh --image ubuntu:24.04 --jobs 4
