# target.toml — sample-r synthetic benchmark target (hand-authored,
# committed). Paths below are relative to target_root.

target        = "samples/sample-r"
upstream_url  = "synthetic — TokenFuzz per-language benchmark (R)"
build_system  = "rlang"
pinned_rev    = "norev"

is_browser    = "0"

[threat_model]
# The CLI turns one attacker-supplied job file into a single report_kit call;
# the job bytes are the only attacker-controlled surface.
attacker_controls = ["bytes"]

# Pure-R target: no sanitizer build. Runtime crashes and LLM-reported
# security issues both land under findings/.
[sanitizer]
enabled = []

[runner]
bin            = "Rscript"
args           = ["{TARGET_ROOT}/reportkit_cli.R", "{TESTCASE}"]
crash_patterns = [
  "^Error in",
  "^Error:",
  "cannot allocate vector",
  "C stack usage .* too close to the limit",
]
