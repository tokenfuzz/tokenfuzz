# target.toml — sample-ruby synthetic benchmark target (hand-authored,
# committed). Paths below are relative to target_root.

target        = "samples/sample-ruby"
upstream_url  = "synthetic — TokenFuzz per-language benchmark (Ruby)"
build_system  = "bundler"
pinned_rev    = "norev"

is_browser    = "0"

[threat_model]
# The CLI turns one attacker-supplied job file into a single ReportKit call;
# the job bytes are the only attacker-controlled surface.
attacker_controls = ["bytes"]

# Pure-Ruby target: no sanitizer build. Runtime crashes and LLM-reported
# security issues both land under findings/.
[sanitizer]
enabled = []

[runner]
bin            = "ruby"
args           = ["{TARGET_ROOT}/reportkit_cli.rb", "{TESTCASE}"]
crash_patterns = [
  "^[A-Z]\\w*Error",
  "stack level too deep",
  "SystemStackError",
  "\\(NoMemoryError\\)",
  "\\(fatal\\)",
]
