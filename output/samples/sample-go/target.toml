# target.toml — sample-go synthetic benchmark target (hand-authored,
# committed). Paths below are relative to target_root.

target        = "samples/sample-go"
upstream_url  = "synthetic — TokenFuzz per-language benchmark (Go)"
build_system  = "go"
pinned_rev    = "norev"

is_browser    = "0"

[threat_model]
# The CLI turns one attacker-supplied job file into a single reportkit call;
# the job bytes are the only attacker-controlled surface.
attacker_controls = ["bytes"]

# Race target: the `go build -race` bootstrap produces the instrumented sample-go
# binary the runner drives, so the concurrent `merge` op's data race is a
# verifiable crash. The security bugs execute through the same binary and land
# under findings/.
[sanitizer]
enabled = ["race"]

[runner]
bin            = "sample-go"
args           = ["{TESTCASE}"]
env            = ["GORACE=halt_on_error=1"]
crash_patterns = [
  "WARNING: DATA RACE",
  "panic: runtime error:",
  "panic:",
  "fatal error: stack overflow",
  "runtime: out of memory",
  "^goroutine \\d+ \\[",
]
