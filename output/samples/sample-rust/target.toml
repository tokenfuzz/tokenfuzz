# target.toml — sample-rust synthetic benchmark target (hand-authored,
# committed). Paths below are relative to target_root.

target        = "samples/sample-rust"
upstream_url  = "synthetic — TokenFuzz per-language benchmark (Rust)"
build_system  = "cargo"
pinned_rev    = "norev"

is_browser    = "0"

[threat_model]
# The CLI turns one attacker-supplied job file into a single reportkit call;
# the job bytes are the only attacker-controlled surface.
attacker_controls = ["bytes"]

# Findings-only (a nightly + rust-src ASan build is a separate opt-in): the
# `cargo build --release` bootstrap produces the sample-rust binary the runner
# drives. Runtime panics and LLM-reported security issues both land under
# findings/.
[sanitizer]
enabled = []

[runner]
bin            = "{TARGET_ROOT}/target/release/sample-rust"
args           = ["{TESTCASE}"]
crash_patterns = [
  "thread '.*' panicked at",
  "fatal runtime error:",
  "==\\d+==ERROR: AddressSanitizer",
]
