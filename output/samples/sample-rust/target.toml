# target.toml — sample-rust synthetic benchmark target (hand-authored,
# committed). Paths below are relative to target_root.

target        = "samples/sample-rust"
upstream_url  = "synthetic — TokenFuzz per-language benchmark (Rust)"
build_system  = "cargo"
pinned_rev    = "norev"

# Instrumented CLI: .audit/build.sh produces a nightly
# `-Zsanitizer=address -Zbuild-std` build. The two unsound-`unsafe` memory bugs
# (pack_table, sum_window) fault under ASan; the security bugs (command
# injection, path traversal) execute through the same binary and land under
# findings/.
asan_bin      = "build-asan/sample-rust"

is_browser    = "0"

[threat_model]
# The CLI turns one attacker-supplied job file into a single reportkit call;
# the job bytes are the only attacker-controlled surface.
attacker_controls = ["bytes"]

[sanitizer]
enabled = ["asan"]
