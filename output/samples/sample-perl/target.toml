# target.toml — sample-perl synthetic benchmark target (hand-authored,
# committed). Paths below are relative to target_root.

target        = "samples/sample-perl"
upstream_url  = "synthetic — TokenFuzz per-language benchmark (Perl)"
build_system  = "perl"
pinned_rev    = "norev"

is_browser    = "0"

[threat_model]
# The CLI turns one attacker-supplied job file into a single ReportKit call;
# the job bytes are the only attacker-controlled surface.
attacker_controls = ["bytes"]

# Pure-Perl target: no sanitizer build. Runtime crashes and LLM-reported
# security issues both land under findings/.
[sanitizer]
enabled = []

[runner]
bin            = "perl"
args           = ["{TARGET_ROOT}/reportkit_cli.pl", "{TESTCASE}"]
crash_patterns = [
  "^Out of memory!",
  "^Segmentation fault",
  "died at .* line",
  "Illegal division by zero",
]
