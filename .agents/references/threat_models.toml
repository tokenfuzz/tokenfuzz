# .agents/references/threat_models.toml — operator-curated [threat_model]
# seed defaults, by target slug.
#
# bin/audit --new-target (via lib/target_config.seed_toml) reads this file
# to seed `attacker_controls` in output/<slug>/target.toml.
# `attacker_controls` declares what an attacker can supply to the target;
# lib/triage.sh uses it to decide whether a found bug is a security
# promotion or an upstream-robustness filing.
#
# Why a curated seed rather than a uniform default: a stateful library API
# (init → use → free, called in an attacker-chosen order) makes
# `call-sequence` attacker-controlled; a protocol implementation adds
# `protocol-state`. A target driven only as a CLI over a fixed argv has
# just `bytes`. The harness cannot reliably tell these apart from the
# source tree alone, so the non-obvious cases are curated here. The seed
# is only a starting point — the operator can edit target.toml afterwards.
#
# Inclusion criterion: a slug belongs here ONLY if its conservative
# default is something other than the byte-only `["bytes"]` fallback —
# i.e. it has an attacker-controlled call sequence and/or protocol state.
# Byte-only targets (most file-format parsers, regex engines, codecs)
# need no entry; they get `["bytes"]` automatically. Browser targets are
# handled structurally in code (is_browser) and are not listed here.
#
# Add a new target by adding a section — no code change. Tokens must be
# valid attacker_controls (see the canonical set in lib/target_config.py
# / lib/target_config.sh); unknown tokens are dropped with a warning when
# the seeded target.toml is loaded.

[c-ares]
# Async DNS resolver: channel lifecycle + query enqueue order are caller-driven.
attacker_controls = ["bytes", "call-sequence", "protocol-state"]

[cares]
# Slug alias for c-ares (normalization may drop the hyphen).
attacker_controls = ["bytes", "call-sequence", "protocol-state"]

[curl]
# Transfer handles + multi/easy API ordering, plus on-wire protocol state.
attacker_controls = ["bytes", "call-sequence", "protocol-state"]

[json]
# nlohmann/json: public DOM/SAX API exercised in caller-chosen order.
attacker_controls = ["bytes", "call-sequence"]

[nlohmann-json]
# Slug alias for json.
attacker_controls = ["bytes", "call-sequence"]

[nlohmann_json]
# Slug alias for json.
attacker_controls = ["bytes", "call-sequence"]

[libxml2]
# Parser/tree/validation public API exercised in caller-chosen order.
attacker_controls = ["bytes", "call-sequence"]
