<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 570"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
     role="img" aria-label="TokenFuzz audit lifecycle: set up the target, run the audit, agents investigate, probe runs the testcase, triage decides outcome">
  <title>TokenFuzz audit lifecycle</title>
  <defs>
    <marker id="al-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <filter id="al-shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style><![CDATA[
      .step       { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 10; ry: 10; }
      .step-num   { font-size: 11px; fill: #ffffff; font-weight: 700; text-anchor: middle; }
      .step-dot   { fill: #4f46e5; }
      .agent      { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.4; rx: 10; ry: 10; }
      .gate       { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; }
      .crash      { fill: #fee2e2; stroke: #ef4444; stroke-width: 1.3; rx: 10; ry: 10; }
      .find       { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.3; rx: 10; ry: 10; }
      .reject     { fill: #f3f4f6; stroke: #6b7280; stroke-width: 1.2; stroke-dasharray: 5 3; rx: 10; ry: 10; }
      .bundle     { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.3; rx: 10; ry: 10; }
      .arrow      { stroke: #475569; stroke-width: 1.5; fill: none; }
      .title      { font-size: 14px; font-weight: 600; fill: #0f172a; }
      .sub        { font-size: 12px; fill: #475569; }
      .micro      { font-size: 11px; fill: #64748b; }
      .chip       { font-size: 10.5px; fill: #475569; font-weight: 600; }
      .gate-label { font-size: 13px; font-weight: 700; fill: #7c2d12; text-anchor: middle; }
      .gate-sub   { font-size: 11px; fill: #92400e; text-anchor: middle; }
      .out-tag    { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    ]]></style>
  </defs>

  <!-- Step 1: Set up the target -->
  <circle cx="40" cy="58" r="13" class="step-dot"/>
  <text x="40" y="62" class="step-num">1</text>
  <g filter="url(#al-shadow)"><rect x="70" y="28" width="850" height="60" class="step"/></g>
  <text x="90"  y="52"  class="title">Set up the target</text>
  <text x="90"  y="74"  class="sub">Add the source checkout and review the generated runner, sanitizer, and threat-model config.</text>

  <path d="M480,88 L480,112" class="arrow" marker-end="url(#al-arrow)"/>

  <!-- Step 2: Run the audit -->
  <circle cx="40" cy="142" r="13" class="step-dot"/>
  <text x="40" y="146" class="step-num">2</text>
  <g filter="url(#al-shadow)"><rect x="70" y="112" width="850" height="64" class="step"/></g>
  <text x="90"  y="136" class="title">Run the audit</text>
  <text x="90"  y="158" class="sub">One command reads the config, creates result, log, and state directories, and probes the build for compiled translation units.</text>
  <text x="90"  y="172" class="micro">State and claims are append-only — the run survives compaction, resume, and crashes.</text>

  <path d="M480,176 L480,206" class="arrow" marker-end="url(#al-arrow)"/>

  <!-- Step 3: Agents investigate -->
  <circle cx="40" cy="256" r="13" class="step-dot"/>
  <text x="40" y="260" class="step-num">3</text>
  <g filter="url(#al-shadow)"><rect x="70" y="206" width="850" height="100" class="agent"/></g>
  <text x="90"  y="230" class="title">Agents investigate, one card and one hypothesis at a time</text>
  <text x="90"  y="252" class="sub">Each agent reads a focused region of source, forms a hypothesis, writes a small testcase, and runs it through `bin/probe`.</text>
  <text x="90"  y="274" class="sub">If the testcase reaches the right code under the sanitizer, it goes to triage. Otherwise the agent revises the input.</text>
  <text x="90"  y="296" class="micro">The ranked queue feeds cards in priority order.</text>

  <path d="M480,306 L480,336" class="arrow" marker-end="url(#al-arrow)"/>

  <!-- Step 4: Triage diamond -->
  <g filter="url(#al-shadow)">
    <polygon points="480,336 580,396 480,456 380,396" class="gate"/>
  </g>
  <text x="480" y="388" class="gate-label">TRIAGE</text>
  <text x="480" y="406" class="gate-sub">security-relevant and concrete?</text>
  <text x="480" y="422" class="gate-sub">evidence complete and reproducible?</text>

  <!-- Outcomes row -->
  <g filter="url(#al-shadow)"><rect x="40"  y="476" width="240" height="64" class="find"/></g>
  <text x="56"  y="494" class="out-tag" fill="#166534">Primary output</text>
  <text x="56"  y="512" class="title">findings/FIND-*</text>
  <text x="56"  y="530" class="micro">Concrete security issue, reproducer optional.</text>

  <g filter="url(#al-shadow)"><rect x="300" y="476" width="240" height="64" class="crash"/></g>
  <text x="316" y="494" class="out-tag" fill="#991b1b">Reproducible subset</text>
  <text x="316" y="512" class="title">crashes/CRASH-*</text>
  <text x="316" y="530" class="micro">Sanitizer or differential proof saved.</text>

  <g filter="url(#al-shadow)"><rect x="560" y="476" width="180" height="64" class="reject"/></g>
  <text x="576" y="494" class="out-tag" fill="#374151">Dropped, with reason</text>
  <text x="576" y="512" class="title">rejected /</text>
  <text x="576" y="527" class="title">needs review</text>

  <g filter="url(#al-shadow)"><rect x="760" y="476" width="160" height="64" class="bundle"/></g>
  <text x="776" y="494" class="out-tag" fill="#9a3412">Auto-export</text>
  <text x="776" y="512" class="title">maintainer</text>
  <text x="776" y="527" class="title">bundle</text>

  <!-- Triage arrows to outcomes -->
  <path d="M400,430 C 320,462 220,474 165,476" class="arrow" marker-end="url(#al-arrow)"/>
  <path d="M480,456 L420,476" class="arrow" marker-end="url(#al-arrow)"/>
  <path d="M560,430 C 580,450 600,468 640,476" class="arrow" marker-end="url(#al-arrow)"/>
  <!-- crash -> bundle -->
  <path d="M540,508 L760,508" class="arrow" marker-end="url(#al-arrow)"/>
</svg>
