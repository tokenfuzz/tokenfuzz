# lib/sanitizer_options.conf — single source of truth for sanitizer runtime
# *_OPTIONS strings.
#
# Format: three whitespace-separated columns
#     <sanitizer>  <mode>  <options>
# The options column is a colon-delimited *_OPTIONS string and never
# contains whitespace. Blank lines and lines starting with '#' are ignored.
#
# Consumed by:
#   - lib/sanitizer.py : sanitizer_options_for()  — used by
#     bin/run-{asan,ubsan,msan,tsan} to build ASAN_OPTIONS/UBSAN_OPTIONS/…
#   - bin/export-repro — generated reproduce.sh files replay the same options.
#
# Edit option strings HERE and nowhere else; every runner and exporter reads
# this file through the shared Python sanitizer helpers.
#
# Modes:
#   full        default high-signal run (browser / generic CLI / HARNESS bin)
#   minimal     reduced-option smoke run (browser-minimal)
#   js          standalone JS shell
#   xpcshell    Firefox parent-process JS/XPCOM runner (asan only)
#   fuzz        libFuzzer corpus run — halt_on_error=0 to keep collecting
#   fuzz-repro  single libFuzzer crash replay — halt_on_error=1
#
# A sanitizer that omits a mode falls back to its `full` row (see
# sanitizer_options_for / _EXPORT_MODE_TO_CANONICAL). Option *vocabularies*
# differ per sanitizer by design — quarantine_size_mb/redzone are ASan-only,
# second_deadlock_stack is TSan-only, print_stats is MSan-only — but the
# halt_on_error polarity is uniform across all four: 1 everywhere except the
# fuzz mode, which uses 0 so a single session collects multiple artifacts.

# sanitizer  mode        options
asan         full        detect_leaks=0:halt_on_error=1:quarantine_size_mb=256:redzone=64:print_scariness=1:handle_abort=1:print_full_thread_history=1
asan         minimal     detect_leaks=0:halt_on_error=1
asan         js          detect_leaks=0:halt_on_error=1:quarantine_size_mb=256:redzone=64:print_scariness=1
asan         xpcshell    detect_leaks=0:halt_on_error=1:quarantine_size_mb=256:redzone=64:print_scariness=1:handle_abort=1
asan         fuzz        detect_leaks=0:halt_on_error=0:quarantine_size_mb=256:redzone=64:print_scariness=1:handle_abort=1
asan         fuzz-repro  detect_leaks=0:halt_on_error=1:quarantine_size_mb=256:redzone=64:print_scariness=1:handle_abort=1

ubsan        full        print_stacktrace=1:halt_on_error=1:print_summary=1
ubsan        minimal     halt_on_error=1
ubsan        js          print_stacktrace=1:halt_on_error=1:print_summary=1
ubsan        fuzz        print_stacktrace=1:halt_on_error=0:print_summary=1
ubsan        fuzz-repro  print_stacktrace=1:halt_on_error=1:print_summary=1

msan         full        halt_on_error=1:print_stats=0
msan         js          halt_on_error=1
msan         fuzz        halt_on_error=0:print_stats=0
msan         fuzz-repro  halt_on_error=1:print_stats=0

tsan         full        halt_on_error=1:second_deadlock_stack=1
tsan         js          halt_on_error=1
tsan         fuzz        halt_on_error=0:second_deadlock_stack=1
tsan         fuzz-repro  halt_on_error=1:second_deadlock_stack=1
