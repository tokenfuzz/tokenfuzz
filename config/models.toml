# Default model per backend — the single source of truth; change a value here
# to switch a backend's model. Override per-run with --model / $MODEL or
# per-backend via *_MODEL_DEFAULT env vars. "oss" has no default — pass --model
# so the local OpenCode provider can match the served model name explicitly.
# Keep provider/CLI model identifiers (they key the benchmark pricing table).
# For gemini on agy the slug is mapped to an `agy models` label in
# lib/llm_invoke.py:agy_model_label.

[models]
claude = "claude-opus-4-8"
codex  = "gpt-5.6-sol"
gemini = "gemini-3.1-pro-preview"
grok   = "grok-build-0.1"
oss    = ""

# Backend-native reasoning controls. The gemini backend uses `agy` by default
# and Google Gemini CLI when USE_GEMINI_CLI=1, so those dialects have separate
# entries. Leave a value empty to let that CLI choose its own default.
[effort]
claude = "high"
codex  = "high"
agy    = "high"
gemini = "high"
grok   = "high"
oss    = ""
